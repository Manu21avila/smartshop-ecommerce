<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartShop | Painel Admin</title>
    <link rel="stylesheet" href="css/style.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script defer src="js/admin.js"></script>
  </head>

  <body>
    <header class="header">
      <h1>📊 Painel Administrativo</h1>
      <a href="index.html" class="cart-btn">Voltar para Loja</a>
    </header>

    <main class="admin-container">
      <div class="kpi-cards">
        <div class="kpi">
          <h3>Receita Total</h3>
          <p id="totalRevenue">R$ 0.00</p>
        </div>

        <div class="kpi">
          <h3>Total de Itens Vendidos</h3>
          <p id="totalSales">0</p>
        </div>

        <div class="kpi">
          <h3>Produto Mais Vendido</h3>
          <p id="topProduct">-</p>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="salesChart"></canvas>
      </div>
    </main>
  </body>
</html>
