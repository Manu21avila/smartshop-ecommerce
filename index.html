<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <title>SmartShop</title>

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header>
      <div class="container header-content">
        <h1>🛍 SmartShop</h1>

        <input type="text" id="search" placeholder="Buscar produto..." />

        <a href="pages/cart.html" class="cart-btn">
          🛒 Carrinho (<span id="cart-count">0</span>)
        </a>
      </div>

      <button id="darkToggle">🌙</button>
    </header>

    <main></main>

    <section class="hero container">
      <h2>SmartShop</h2>
      <p>Uma experiência moderna de e-commerce construída com JavaScript</p>
    </section>

    <section class="container">
      <div class="filters">
        <select id="categoryFilter">
          <option value="all">Todas Categorias</option>
          <option value="tecnologia">Tecnologia</option>
          <option value="moda">Moda</option>
        </select>

        <select id="sortFilter">
          <option value="default">Ordenar por</option>
          <option value="priceAsc">Menor preço</option>
          <option value="priceDesc">Maior preço</option>
        </select>
      </div>

      <div id="products" class="products-grid"></div>
    </section>

  </main>

    <footer>
      <p>© 2026 SmartShop - Projeto de Portfólio por Emanuelle Ávila</p>
    </footer>

    <script src="js/main.js"></script>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>

        <img id="modalImage" />

        <h2 id="modalTitle"></h2>

        <p id="modalPrice"></p>

        <button id="modalAdd">Adicionar ao Carrinho</button>
      </div>
    </div>

    <div id="sideCart" class="side-cart">
      <h3>Seu Carrinho</h3>

      <div id="sideCartItems"></div>

      <button onclick="goToCart()">Finalizar Compra</button>

      <div id="toast">Produto adicionado ao carrinho</div>
    </div>
  </body>
</html>
